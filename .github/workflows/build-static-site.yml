name: Benchmark Bundlers

on:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        entry:
          - '{"script":"build:esbuild","log":"esbuild"}'
          - '{"script":"build:rollup","log":"rollup"}'
          - '{"script":"build:webpack","log":"webpack"}'
          - '{"script":"build:farm","log":"farm"}'
          - '{"script":"build:rspack","log":"rspack"}'
          - '{"script":"build:parcel","log":"parcel"}'
          - '{"script":"build:snowpack","log":"snowpack"}'
          - '{"script":"build:rolldown","log":"rolldown"}'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Prepare log directory
        run: mkdir -p time

      - name: Run benchmark loop
        shell: bash
        run: |
          DATA=$(echo '${{ matrix.entry }}' | jq -r '.')
          SCRIPT=$(echo "$DATA" | jq -r '.script')
          LOG=$(echo "$DATA" | jq -r '.log')

          LOGFILE="time/$LOG.log"
          echo "Writing results to $LOGFILE"
          echo "=== Benchmark: $SCRIPT ===" > "$LOGFILE"

          for i in {1..10}; do
            echo "Run #$i" | tee -a "$LOGFILE"

            /usr/bin/time -v yarn $SCRIPT 2>&1 | awk '
              /Maximum resident set size/ {ram=$6/1024}
              /Percent of CPU this job got/ {cpu=$0; sub(/.*: /,"",cpu)}
              END {printf "Peak RAM: %.2f MB\nCPU Load: %s\n", ram, cpu}' \
              | tee -a "$LOGFILE"

            echo "----------------------------------------" | tee -a "$LOGFILE"
          done

