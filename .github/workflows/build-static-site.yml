name: Benchmark Bundlers

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: yarn install --frozen-lockfile

      - run: mkdir -p time

      - name: Run all bundler benchmarks
        shell: bash
        run: |
          run_benchmark() {
            SCRIPT=$1
            LOG=$2

            # Parcel needs "source": "index.html"
            if [[ "$SCRIPT" == "build:parcel" ]]; then
              echo "Adding Parcel source field to package.json"
              jq '. + {source: "index.html"}' package.json > package.tmp.json
              mv package.tmp.json package.json
            fi

            touch time/$LOG.log
            for i in {1..10}; do
              /usr/bin/time -v yarn $SCRIPT 2>&1 | awk '
                /Maximum resident set size/ {ram=$6/1024}
                /Elapsed \(wall clock\) time/ {seconds=$0; sub(/.*: /,"",seconds)}
                /Percent of CPU this job got/ {cpu=$0; sub(/.*: /,"",cpu)}
                END {printf "Peak RAM: %.2f MB\nCPU Load: %s\nSeconds: %s\n", ram, cpu, seconds}' \
                >> "time/$LOG.log"
            done
          }

          run_benchmark build:esbuild esbuild
          run_benchmark build:rollup rollup
          run_benchmark build:webpack webpack
          run_benchmark build:farm farm
          run_benchmark build:rspack rspack
          run_benchmark build:parcel parcel
          run_benchmark build:snowpack snowpack
          run_benchmark build:rolldown rolldown

          cd my-app 
          yarn install --frozen-lockfile 
          printf '{"date": "%s", "node_version": "%s", "cores": "%s", "ram": "%s"}\n' "$(date)" "$(node -v)" "$(nproc --all)" "$(free -h | awk '/^Mem:/ {print $2}')" > app/config.json
          yarn build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./my-app/out  
      - name: Upload benchmark logs
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-logs
          path: time/

  checks:
    name: Required Checks for Automerge
    needs: benchmark
    if: github.event_name == 'pull_request' && (github.actor == 'dependabot[bot]' || startsWith(github.head_ref, 'dependabot/'))
    runs-on: ubuntu-latest
    steps:
      - name: Download benchmark logs
        uses: actions/download-artifact@v4
        with:
          name: benchmark-logs
          path: time/

      - name: Verify log iterations
        shell: bash
        run: |
          EXIT_CODE=0

          # Count the number of .log files in the time directory
          file_count=$(ls -1 time/*.log 2>/dev/null | wc -l)
          
          echo "Found $file_count log files."
          if [ "$file_count" -ne 8 ]; then
            echo "❌ Error: Expected exactly 8 log files, but found $file_count."
            exit 1
          fi
          
          for logfile in time/*.log; do
            echo "Checking $logfile..."
            
            # Count occurrences of the metric keys
            ram_count=$(grep -c "Peak RAM:" "$logfile" || true)
            cpu_count=$(grep -c "CPU Load:" "$logfile" || true)
            time_count=$(grep -c "Seconds:" "$logfile" || true)
            
            if [ "$ram_count" -ne 10 ] || [ "$cpu_count" -ne 10 ] || [ "$time_count" -ne 10 ]; then
              echo "❌ Error: $logfile does not have exactly 10 iterations (RAM: $ram_count, CPU: $cpu_count, Time: $time_count)"
              EXIT_CODE=1
            else
              echo "✅ $logfile passed verification."
            fi
          done
          
          exit $EXIT_CODE

  automerge:
    name: Enable Automerge for Dependabot
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Enable auto-merge using GitHub CLI
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}

  deploy:
    needs: benchmark
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
